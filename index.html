  <body>
    <div id="root"></div>
    
    <!-- Register Service Worker -->
    <script>
      const isLocalhost = ['localhost', '127.0.0.1', '[::1]'].includes(window.location.hostname);
      if ('serviceWorker' in navigator && isLocalhost) {
        navigator.serviceWorker.getRegistrations()
          .then((registrations) => registrations.forEach((registration) => registration.unregister()))
          .catch((err) => console.error('Service Worker cleanup failed:', err));
      }

      if ('serviceWorker' in navigator && !isLocalhost) {
        let refreshing = false;
        const showUpdatingMessage = () => {
          if (document.getElementById('pwa-update-overlay')) return;

          const overlay = document.createElement('div');
          overlay.id = 'pwa-update-overlay';
          overlay.setAttribute('role', 'status');
          overlay.setAttribute('aria-live', 'polite');
          overlay.textContent = '업데이트 중입니다. 잠시만 기다려주세요...';
          overlay.style.cssText = [
            'position:fixed',
            'inset:0',
            'z-index:99999',
            'display:flex',
            'align-items:center',
            'justify-content:center',
            'padding:24px',
            'background:#0B0F19',
            'color:#FFFFFF',
            'font-size:16px',
            'font-weight:700',
            'text-align:center',
            'font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif'
          ].join(';');
          document.body.appendChild(overlay);
        };

        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          showUpdatingMessage();
          window.location.reload();
        });

        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js?v=20260526-v13')
            .then((reg) => {
              console.log('Service Worker registered:', reg.scope);
              reg.update();

              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (!newWorker) return;

                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    showUpdatingMessage();
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
            })
            .catch((err) => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
